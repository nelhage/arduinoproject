<!DOCTYPE html>
<html>
  <head>
    <title>LED Heart</title>
    <script src="main.js" type="text/javascript"></script>
    <script src="wasm/heart.js" type="text/javascript"></script>

    <style>
     :root {
         --led-size: 10px;
         --display-size: 400px;
     }

     #container {
         position: relative;
         border: 1px solid black;
         width: var(--display-size);
         height: var(--display-size);
     }

     .led {
         position: absolute;
         width: var(--led-size);
         height: var(--led-size);
         border-radius: var(--led-size);
         background-color: red;
     }
    </style>
  </head>
  <body>
    <div id='container'>
    </div>
  </body>
</html>
